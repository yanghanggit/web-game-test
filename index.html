<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #wrapper {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    #gameFrame {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
    }

    #bottom-bar {
      flex-shrink: 0;
      height: 60px;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 0 16px;
    }

    .btn {
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      color: #fff;
      background: #e94560;
      touch-action: manipulation;
    }

    .btn:active {
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div id="wrapper">
    <iframe id="gameFrame" src="/game/index.html" allowfullscreen></iframe>

    <div id="bottom-bar">
      <button class="btn" id="btn-restart">重新开始</button>
      <button class="btn" id="btn-custom" style="background:#16213e; border:1px solid #e94560;">自定义按钮</button>
    </div>
  </div>

  <script>
    const gameFrame = document.getElementById('gameFrame');

    // 向游戏 iframe 发送消息（游戏内部可用 window.addEventListener('message', ...) 接收）
    function sendToGame(action, data) {
      gameFrame.contentWindow.postMessage({ action, data }, '*');
    }

    document.getElementById('btn-restart').addEventListener('click', () => {
      // 加时间戳强制绕过浏览器缓存，确保加载最新资源
      gameFrame.src = '/game/index.html?t=' + Date.now();
    });

    document.getElementById('btn-custom').addEventListener('click', () => {
      sendToGame('custom', {});
    });
  </script>
</body>
</html>
