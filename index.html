<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #wrapper {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    #gameFrame {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
    }

    #bottom-bar {
      flex-shrink: 0;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px 16px;
    }

    #btn-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    #agent-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #agent-input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #e94560;
      border-radius: 6px;
      background: #0f0f1a;
      color: #fff;
      font-size: 14px;
      outline: none;
    }

    #agent-input::placeholder { color: #555; }

    #agent-status {
      font-size: 12px;
      color: #aaa;
      min-height: 16px;
      text-align: center;
    }

    .btn {
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      color: #fff;
      background: #e94560;
      touch-action: manipulation;
    }

    .btn:active {
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div id="wrapper">
    <iframe id="gameFrame" src="/game/index.html" allowfullscreen></iframe>

    <div id="bottom-bar">
      <div id="btn-row">
        <button class="btn" id="btn-restart">重新开始</button>
        <button class="btn" id="btn-custom" style="background:#16213e; border:1px solid #e94560;">自定义按钮</button>
      </div>
      <div id="agent-row">
        <input id="agent-input" type="text" placeholder='例：把新闻图片换成 gen-images 里的图片' />
        <button class="btn" id="btn-agent" style="white-space:nowrap;">AI 执行</button>
      </div>
      <div id="agent-status"></div>
    </div>
  </div>

  <script>
    const gameFrame = document.getElementById('gameFrame');

    // 向游戏 iframe 发送消息（游戏内部可用 window.addEventListener('message', ...) 接收）
    function sendToGame(action, data) {
      gameFrame.contentWindow.postMessage({ action, data }, '*');
    }

    document.getElementById('btn-restart').addEventListener('click', async () => {
      // 1. 先将 gen-images/ 下的文件替换到游戏资源目录
      const result = await fetch('/api/swap-images', { method: 'POST' }).then(r => r.json());
      console.log('[swap]', result);
      // 2. 加时间戳强制绕过浏览器缓存，确保加载最新资源
      gameFrame.src = '/game/index.html?t=' + Date.now();
    });

    document.getElementById('btn-custom').addEventListener('click', () => {
      sendToGame('custom', {});
    });

    // AI Pipeline
    const agentStatus = document.getElementById('agent-status');
    const btnAgent = document.getElementById('btn-agent');

    btnAgent.addEventListener('click', async () => {
      const instruction = document.getElementById('agent-input').value.trim();
      if (!instruction) return;

      btnAgent.disabled = true;
      agentStatus.innerHTML = '🎨 生图中...';

      // Animate the status through stages while waiting for the response
      let stage = 0;
      const stageLabels = ['🎨 生图中...', '🔍 定位游戏资源...'];
      const stageTimer = setInterval(() => {
        stage++;
        if (stage < stageLabels.length) {
          agentStatus.innerHTML = stageLabels[stage];
        }
      }, 2200); // T2I mock takes ~2 s, then asset search

      try {
        const res = await fetch('/api/pipeline', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ instruction }),
        });
        clearInterval(stageTimer);

        const data = await res.json();

        if (data.error) {
          agentStatus.innerHTML = '❌ 错误: ' + data.error;
        } else if (data.swappedPath) {
          agentStatus.innerHTML = '✅ 替换完成：' + data.swappedPath;
          setTimeout(() => {
            gameFrame.src = '/game/index.html?t=' + Date.now();
          }, 800);
        } else {
          // Show last stage message or LLM reply
          const lastStage = data.stages?.[data.stages.length - 1];
          agentStatus.innerHTML = (lastStage?.message) || data.reply || '⚠️ 未执行替换';
        }
      } catch (e) {
        clearInterval(stageTimer);
        agentStatus.innerHTML = '🌐 网络错误: ' + e.message;
      } finally {
        btnAgent.disabled = false;
      }
    });
  </script>
</body>
</html>
